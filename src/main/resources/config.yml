recommended-pool:
  - "000001"
  - "600519"
  - "000858"
  - "AAPL"
  - "TSLA"
  - "MSFT"
recommended-count: 3

# 操作冷却时间（毫秒），旧配置 api-cooldown-seconds 仍兼容
api-cooldown-ms: 1000

price-ratio: 1.0

# 交易手续费费率（百分比），默认 0.5%，设为 0 表示免手续费
transaction-fee-percent: 0.5

# K线数据缓存时间（毫秒），默认 5 分钟
kline-cache-ms: 300000

# 港股 API 配置（从上往下依次请求）
# 支持代码格式：4-5 位数字（0700）或带 .HK 后缀（0700.HK）
# 可选 interface：eastmoney（无需 key）、finnhub、twelvedata
hk-stock-apis:
  - interface: eastmoney
  - interface: finnhub
    apikey: ""
  - interface: twelvedata
    apikey: ""

# 美股 API 配置（从上往下依次请求）
# 遇到 429 频率限制时，自动切换下一条相同 interface 的 key 重试
# 遇到其他错误时，跳过同类 interface，切换下一种 interface
us-stock-apis:
  - interface: finnhub
    apikey: ""
  - interface: twelvedata
    apikey: ""

# A 股 API 配置（从上往下依次请求，无需 apikey）
# 可选 interface：sina、tencent、eastmoney、netease
cn-stock-apis:
  - interface: eastmoney
  - interface: sina
  - interface: tencent
  - interface: netease

# 加密货币 API 配置（从上往下依次请求）
# 代码格式：BASE/QUOTE 或 BASE-QUOTE，例如 BTC/USDT、ETH-USD
# 纯字母代码（如 BTC）会与美股并行竞速，哪个先返回有效结果就用哪个
#
# tradeable：该 API 的数据是否可用于实际交易（时效性强的交易所数据为 true）
#   - 默认值由时效性决定：实时交易所数据默认 true，聚合/延迟数据默认 false
#   - 可在此处手动覆盖，例如将某个 API 设为 tradeable: false 仅供参考
#
# 可选 interface：
#   binance   — 全球最大交易所，无需 key，~3000次/分，实时 tick 数据，tradeable 默认 true
#   okx       — 第二大交易所，无需 key，600次/分，实时 tick 数据，tradeable 默认 true
#   kraken    — 欧美主流交易所，无需 key，~60次/分，实时 tick 数据，tradeable 默认 true
#   coingecko — 聚合行情，需免费注册 apikey，30次/分，1-2分钟延迟，tradeable 默认 false
crypto-apis:
  - interface: binance
    tradeable: true
  - interface: okx
    tradeable: true
  - interface: kraken
    tradeable: true
  - interface: coingecko
    apikey: ""
    tradeable: false
