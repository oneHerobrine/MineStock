# 推荐池可写成股票代码列表：
# recommended-pool:
#   - "000001"
#   - "600519"
#   - "AAPL"
# 也可写成 auto，由插件每天从沪深 A 股市场自动选股：recommended-pool: auto
recommended-pool:
  - "000001"
  - "600519"
  - "000858"
  - "AAPL"
  - "TSLA"
  - "MSFT"
recommended-count: 3

# auto 模式拉取并参与评分的候选数量，范围为 recommended-count ~ 500
auto-candidate-count: 100

# MineStock 告示牌行情刷新周期（秒，最小 30）
sign-refresh-seconds: 300

# 操作冷却时间（毫秒），旧配置 api-cooldown-seconds 仍兼容
api-cooldown-ms: 1000

price-ratio: 1.0

# 交易手续费费率（百分比），默认 0.5%，设为 0 表示免手续费
transaction-fee-percent: 0.5

# K线数据缓存时间（毫秒），默认 5 分钟
kline-cache-ms: 300000

# 美股 API 配置（按优先级排列，失败自动切换）
# apikeys 支持多个 key，请求会均匀分配到每个 key（round-robin）
# 兼容旧格式：若只填写 apikey（单项），会自动当作单元素列表处理
us-stock-apis:
  - name: finnhub
    apikeys:
      - ""
  - name: twelvedata
    apikeys:
      - ""
