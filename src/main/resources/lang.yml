db-error: "<red>数据库操作失败，操作已回滚。</red>"

reload-success: "<green>MineStock 配置已重载。</green>"
reload-no-permission: "<red>只有 OP 或拥有 minestock.admin 权限才能重载。</red>"

usage: |
  <gold>MineStock 命令帮助:</gold>
  <white>/mstock recommended</white> <gray>- 查看今日推荐股票</gray>
  <white>/mstock <代码></white> <gray>- 查询股票实时信息</gray>
  <white>/mstock buy <代码> <数量></white> <gray>- 购买股票</gray>
  <white>/mstock sell <代码> <数量></white> <gray>- 卖出股票</gray>
  <white>/mstock portfolio</white> <gray>- 查看我的持仓</gray>
  <white>/mstock reload</white> <gray>- 重载配置文件（需要 minestock.admin 权限）</gray>
